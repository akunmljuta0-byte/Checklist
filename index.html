<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Tài Khoản Game</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#333;padding:16px}
h1{font-size:18px;font-weight:600;margin-bottom:16px;color:#2d2d2d}
.top-stats{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:#fff;border:1px solid #e0e0d8;border-radius:8px;padding:10px 18px;display:flex;align-items:center;gap:10px;font-size:13px}
.dot{width:11px;height:11px;border-radius:50%}
.dot-active{background:#3B6D11}.dot-soon{background:#b8860b}.dot-urgent{background:#c0522a}.dot-expired{background:#A32D2D}
.stat-num{font-size:20px;font-weight:700}
.controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.controls input,.controls select{
  padding:9px 14px;border:1px solid #d8d8cc;border-radius:8px;
  font-size:14px;background:#fff;color:#333;outline:none;min-width:180px
}
.controls input:focus,.controls select:focus{border-color:#aaa}
.btn-add{
  padding:9px 18px;background:#2D6A4F;color:#fff;border:none;
  border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;margin-left:auto
}
.btn-add:hover{background:#1B4332}
.table-wrap{background:#fff;border:1px solid #e0e0d8;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:#f0efe8;padding:10px 12px;text-align:left;font-weight:600;
  color:#555;border-bottom:1px solid #e0e0d8;white-space:nowrap
}
tbody td{padding:10px 12px;border-bottom:1px solid #f0efe8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf6}
.badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge-active{background:#d8f3dc;color:#1B4332}
.badge-soon{background:#fff3cd;color:#856404}
.badge-urgent{background:#fde5d4;color:#7B3F00}
.badge-expired{background:#f8d7da;color:#721C24}
.action-col{display:flex;flex-direction:column;gap:5px;align-items:flex-start}
.btn-checkout{
  padding:5px 14px;border:1.5px solid #ccc;border-radius:7px;background:#fff;
  font-size:12px;cursor:pointer;font-weight:600;color:#333;width:100px
}
.btn-checkout:hover{background:#f0f0ea}
.btn-checkin{
  padding:5px 14px;border:1.5px solid #52B788;border-radius:7px;background:#d8f3dc;
  font-size:12px;cursor:pointer;font-weight:600;color:#1B4332;width:100px
}
.btn-checkin:hover{background:#b7e4c7}
.row-actions{display:flex;gap:6px;margin-top:3px}
.btn-edit{
  padding:4px 12px;border:1px solid #ccc;border-radius:6px;background:#fff;
  font-size:12px;cursor:pointer;color:#444
}
.btn-edit:hover{background:#f0f0ea}
.btn-del{
  padding:4px 12px;border:1px solid #f5c2c7;border-radius:6px;background:#fff;
  font-size:12px;cursor:pointer;color:#A32D2D
}
.btn-del:hover{background:#f8d7da}
.empty{text-align:center;padding:30px;color:#999;font-size:14px}
/* Modal */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);
  align-items:center;justify-content:center;z-index:999
}
.modal-bg.show{display:flex}
.modal{
  background:#fff;border-radius:12px;padding:24px;width:380px;
  max-width:95vw;box-shadow:0 8px 30px rgba(0,0,0,0.15)
}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px;color:#2d2d2d}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:600}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:8px 11px;border:1px solid #ddd;border-radius:7px;
  font-size:13px;color:#333;outline:none
}
.form-row input:focus,.form-row select:focus{border-color:#2D6A4F}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.btn-save{
  padding:8px 20px;background:#2D6A4F;color:#fff;border:none;
  border-radius:7px;font-size:13px;cursor:pointer;font-weight:600
}
.btn-save:hover{background:#1B4332}
.btn-cancel{
  padding:8px 16px;border:1px solid #ccc;border-radius:7px;
  background:#fff;color:#555;font-size:13px;cursor:pointer
}
.btn-cancel:hover{background:#f5f5f0}
.note-warn{
  background:#fff3cd;border:1px solid #ffc107;border-radius:6px;
  padding:6px 12px;font-size:12px;color:#856404;margin-bottom:14px;text-align:center
}
@media(max-width:600px){
  thead th:nth-child(1),tbody td:nth-child(1){display:none}
  .controls input,.controls select{min-width:120px}
}
</style>
</head>
<body>
<h1>Quản Lý Tài Khoản Game</h1>
<div class="note-warn">Lưu Ý: PA không đăng Email ảo — Xa Thải Ngay lập tức nếu vi phạm</div>

<div class="top-stats">
  <div class="stat-box"><div class="dot dot-active"></div>Active<span class="stat-num" id="cnt-active">0</span></div>
  <div class="stat-box"><div class="dot dot-soon"></div>Soon<span class="stat-num" id="cnt-soon">0</span></div>
  <div class="stat-box"><div class="dot dot-urgent"></div>Urgent<span class="stat-num" id="cnt-urgent">0</span></div>
  <div class="stat-box"><div class="dot dot-expired"></div>Expired<span class="stat-num" id="cnt-expired">0</span></div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Tìm game..." oninput="render()">
  <select id="filter-forum" onchange="render()">
    <option value="">Tất cả Forum</option>
    <option value="PA">PA</option>
    <option value="Eldorado">Eldorado</option>
  </select>
  <select id="filter-status" onchange="render()">
    <option value="">Tất cả trạng thái</option>
    <option value="Active">Active</option>
    <option value="Soon">Soon</option>
    <option value="Urgent">Urgent</option>
    <option value="Expired">Expired</option>
  </select>
  <button class="btn-add" onclick="openAdd()">+ Thêm mới</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
  <th>#</th>
  <th>Game Name</th>
  <th>Forum</th>
  <th>Check-in</th>
  <th>Expired Date</th>
  <th>Còn Lại</th>
  <th>Status</th>
  <th>Note</th>
  <th>Hành động</th>
</tr>
</thead>
<tbody id="tbl-body"></tbody>
</table>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
<div class="modal">
  <h3 id="modal-title">Thêm tài khoản game</h3>
  <div class="form-row"><label>Game Name</label><input id="f-game" type="text" placeholder="Nhập tên game..."></div>
  <div class="form-row"><label>Forum</label>
    <select id="f-forum">
      <option value="PA">PA</option>
      <option value="Eldorado">Eldorado</option>
      <option value="Khác">Khác</option>
    </select>
  </div>
  <div class="form-row"><label>Ngày hết hạn</label><input id="f-expired" type="date"></div>
  <div class="form-row"><label>Ghi chú</label><input id="f-note" type="text" placeholder="Tuỳ chọn..."></div>
  <div class="modal-actions">
    <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
    <button class="btn-save" onclick="saveEntry()">Lưu</button>
  </div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  updateDoc,
  deleteDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyB--8tf1AZWyuR0XbC-vGkbBQ1HwbqBcTA",
  authDomain: "mrbull-e2e64.firebaseapp.com",
  projectId: "mrbull-e2e64",
  storageBucket: "mrbull-e2e64.firebasestorage.app",
  messagingSenderId: "113835433005",
  appId: "1:113835433005:web:78d661334c776b73b1eca4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let editId = null;

const colRef = collection(db, "games");

/* ===== UTIL ===== */
function getToday(){
  var now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}
function getDaysLeft(expiredStr){
  var parts = expiredStr.split('-');
  var exp = new Date(+parts[0], +parts[1]-1, +parts[2]);
  var today = getToday();
  return Math.round((exp - today)/(1000*60*60*24));
}
function getStatus(row){
  if(!row.active) return 'Expired';
  var d = getDaysLeft(row.expired);
  if(d < 0) return 'Expired';
  if(d <= 2) return 'Urgent';
  if(d <= 5) return 'Soon';
  return 'Active';
}
function badgeHtml(s){
  var map={Active:'badge-active',Soon:'badge-soon',Urgent:'badge-urgent',Expired:'badge-expired'};
  return '<span class="badge '+map[s]+'">'+s+'</span>';
}
function fmtExpired(str){
  var p=str.split('-'); return p[2]+'/'+p[1]+'/'+p[0];
}
function nowStr(){
  var n=new Date();
  return n.toLocaleDateString('vi-VN')+' '+n.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* ===== REALTIME LOAD ===== */
onSnapshot(colRef, snapshot => {
  data = snapshot.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));
  render();
});

/* ===== RENDER ===== */
window.render = function(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var ff=document.getElementById('filter-forum').value;
  var fs=document.getElementById('filter-status').value;

  var cnt={Active:0,Soon:0,Urgent:0,Expired:0};
  data.forEach(r=>cnt[getStatus(r)]++);

  document.getElementById('cnt-active').textContent=cnt.Active;
  document.getElementById('cnt-soon').textContent=cnt.Soon;
  document.getElementById('cnt-urgent').textContent=cnt.Urgent;
  document.getElementById('cnt-expired').textContent=cnt.Expired;

  var rows=data.filter(r=>{
    var s=getStatus(r);
    if(q && !r.game.toLowerCase().includes(q)) return false;
    if(ff && r.forum!==ff) return false;
    if(fs && s!==fs) return false;
    return true;
  });

  var html='';
  if(!rows.length){
    html='<tr><td colspan="9"><div class="empty">Không có dữ liệu</div></td></tr>';
  }

  rows.forEach((r,i)=>{
    var s=getStatus(r);
    var d=getDaysLeft(r.expired);
    var dayStr=d<0?'Đã hết':d+'d';

    var actionBtn=r.active
      ?`<button class="btn-checkout" onclick="checkout('${r.id}')">Check-out</button>`
      :`<button class="btn-checkin" onclick="checkin('${r.id}')">Check-in</button>`;

    html+=`
    <tr>
      <td>${i+1}</td>
      <td><b>${r.game}</b></td>
      <td>${r.forum}</td>
      <td>${r.checkin}</td>
      <td>${fmtExpired(r.expired)}</td>
      <td>${dayStr}</td>
      <td>${badgeHtml(s)}</td>
      <td>${r.note||''}</td>
      <td>
        ${actionBtn}
        <button onclick="editEntry('${r.id}')">Sửa</button>
        <button onclick="deleteEntry('${r.id}')">Xoá</button>
      </td>
    </tr>`;
  });

  document.getElementById('tbl-body').innerHTML=html;
};

/* ===== CRUD ===== */

window.saveEntry = async function(){
  let game=document.getElementById('f-game').value.trim();
  let forum=document.getElementById('f-forum').value;
  let expired=document.getElementById('f-expired').value;
  let note=document.getElementById('f-note').value.trim();

  if(!game||!expired){
    alert('Thiếu dữ liệu');
    return;
  }

  if(editId){
    await updateDoc(doc(db,"games",editId),{
      game,forum,expired,note
    });
  }else{
    await addDoc(colRef,{
      game,forum,expired,note,
      active:true,
      checkin:nowStr()
    });
  }

  closeModal();
};

window.deleteEntry = async function(id){
  if(confirm("Xoá?")){
    await deleteDoc(doc(db,"games",id));
  }
};

window.checkout = async function(id){
  await updateDoc(doc(db,"games",id),{active:false});
};

window.checkin = async function(id){
  await updateDoc(doc(db,"games",id),{
    active:true,
    checkin:nowStr()
  });
};

window.editEntry = function(id){
  var r=data.find(x=>x.id===id);
  editId=id;

  document.getElementById('f-game').value=r.game;
  document.getElementById('f-forum').value=r.forum;
  document.getElementById('f-expired').value=r.expired;
  document.getElementById('f-note').value=r.note;

  document.getElementById('modal').classList.add('show');
};

window.openAdd = function(){
  editId=null;
  document.getElementById('f-game').value='';
  document.getElementById('modal').classList.add('show');
};

window.closeModal = function(){
  document.getElementById('modal').classList.remove('show');
};
</script>
</body>
</html>
